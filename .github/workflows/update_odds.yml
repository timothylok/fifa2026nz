name: Refresh Odds

on:
  workflow_dispatch:

permissions:
  contents: write

# Both data workflows push to main — never run them at the same time
concurrency:
  group: repo-data-push

jobs:
  odds:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Fetch bookmaker odds
        timeout-minutes: 5
        working-directory: backend
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python fetch_odds.py

      - name: Commit & push if changed
        timeout-minutes: 3
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/market_odds.json
          git diff --staged --quiet || git commit -m "chore: odds refresh [skip ci]"
          git push

