name: Refresh Odds

on:
  schedule:
    - cron: '0 */4 * * *'  # Every 4 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  odds:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Fetch bookmaker odds
        timeout-minutes: 5
        working-directory: backend
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python fetch_odds.py

      - name: Commit & push if changed
        timeout-minutes: 3
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/market_odds.json
          git diff --staged --quiet || git commit -m "chore: odds refresh [skip ci]"
          git push

      - name: Notify failure via Resend
        if: failure()
        continue-on-error: true
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          RESEND_TO: ${{ secrets.RESEND_TO }}
          RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          WORKFLOW_NAME: "${{ github.workflow }}"
        run: |
          python - <<'EOF'
          import os, json, urllib.request, urllib.error

          api_key = os.environ.get("RESEND_API_KEY", "")
          from_addr = os.environ.get("RESEND_FROM", "")
          to_addr = os.environ.get("RESEND_TO", "")
          if not api_key or not from_addr or not to_addr:
              print("RESEND_API_KEY, RESEND_FROM, or RESEND_TO not set — skipping notification.")
          else:
              payload = json.dumps({
                  "from": from_addr,
                  "to": [to_addr],
                  "subject": f"[FIFA2026] {os.environ['WORKFLOW_NAME']} failed",
                  "html": (
                      f"<p>The <b>{os.environ['WORKFLOW_NAME']}</b> "
                      f"GitHub Actions workflow failed.</p>"
                      f"<p><a href=\"{os.environ['RUN_URL']}\">View run logs &rarr;</a></p>"
                  ),
              }).encode()
              req = urllib.request.Request(
                  "https://api.resend.com/emails",
                  data=payload,
                  headers={
                      "Authorization": f"Bearer {api_key}",
                      "Content-Type": "application/json",
                  },
              )
              try:
                  with urllib.request.urlopen(req, timeout=10) as r:
                      print("Resend:", r.status, r.read().decode())
              except urllib.error.HTTPError as e:
                  print("Resend error:", e.code, e.read().decode())
          EOF
