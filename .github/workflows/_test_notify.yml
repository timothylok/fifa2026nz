name: _Test Failure Notification

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Intentional failure
        run: exit 1

      - name: Notify failure via Resend
        if: failure()
        continue-on-error: true
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          WORKFLOW_NAME: "${{ github.workflow }}"
        run: |
          python - <<'EOF2'
          import os, json, urllib.request, urllib.error
          api_key = os.environ.get("RESEND_API_KEY", "")
          if not api_key:
              print("RESEND_API_KEY not set — skipping notification.")
          else:
              payload = json.dumps({
                  "from": "onboarding@resend.dev",
                  "to": ["timlok@gmail.com"],
                  "subject": f"[FIFA2026] {os.environ['WORKFLOW_NAME']} failed",
                  "html": f"<p>Test notification.</p><p><a href=\"{os.environ['RUN_URL']}\">View logs</a></p>",
              }).encode()
              req = urllib.request.Request(
                  "https://api.resend.com/emails",
                  data=payload,
                  headers={"Authorization": f"Bearer {api_key}", "Content-Type": "application/json"},
              )
              try:
                  with urllib.request.urlopen(req, timeout=10) as r:
                      print("Resend:", r.status, r.read().decode())
              except urllib.error.HTTPError as e:
                  print("Resend error:", e.code, e.read().decode())
          EOF2
