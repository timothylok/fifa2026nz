name: Refresh Data & Simulations

on:
  schedule:
    - cron: '0 6 * * *'  # Daily 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Fetch latest match data
        working-directory: backend
        run: python fetch_data.py

      - name: Run simulations
        working-directory: backend
        run: python run.py --data data/historical_matches.csv --sims 10000 --output ../public/data/results.json

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/data/historical_matches.csv public/data/results.json
          git diff --staged --quiet || git commit -m "chore: daily data refresh [skip ci]"
          git push
