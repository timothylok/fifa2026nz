name: Refresh Data & Simulations

on:
  schedule:
    - cron: '0 6 * * *'  # Daily 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Fetch latest match data
        timeout-minutes: 5
        working-directory: backend
        run: python fetch_data.py

      - name: Run simulations
        timeout-minutes: 10
        working-directory: backend
        run: python run.py --data data/historical_matches.csv --sims 10000 --output ../public/data/results.json

      - name: Validate simulation output
        timeout-minutes: 2
        working-directory: backend
        run: python validate_results.py ../public/data/results.json

      - name: Fetch bookmaker odds
        timeout-minutes: 5
        working-directory: backend
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python fetch_odds.py || echo "Odds fetch failed — keeping existing market_odds.json"

      - name: Commit & push if changed
        timeout-minutes: 3
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/data/historical_matches.csv public/data/results.json public/data/market_odds.json public/data/prob_history.json public/data/elo_history.json
          git diff --staged --quiet || git commit -m "chore: daily data refresh [skip ci]"
          git push

